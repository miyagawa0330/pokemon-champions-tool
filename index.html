<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#4f8fa3">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="ポケモンCH検索">
  <title>ポケモンチャンピオンズ検索ツール</title>
  <style>
    :root {
      --bg: #eaf6f8;
      --card: #ffffff;
      --main: #4f8fa3;
      --main-dark: #366d80;
      --soft: #d7eef3;
      --text: #2f3b40;
      --muted: #66777e;
      --line: #c9e1e7;
      --accent: #ff9999;
      --shadow: 0 10px 28px rgba(35, 77, 90, 0.12);
      --radius: 18px;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Hiragino Kaku Gothic ProN", "Yu Gothic", Meiryo, sans-serif;
      background: linear-gradient(180deg, var(--bg), #f7fbfc);
      color: var(--text);
      line-height: 1.55;
    }
    .app { max-width: 980px; margin: 0 auto; padding: 18px 14px 48px; }
    header {
      padding: 18px 4px 10px;
      display: flex;
      gap: 12px;
      align-items: center;
      justify-content: space-between;
    }
    .title-wrap { min-width: 0; }
    h1 { margin: 0; font-size: clamp(22px, 5vw, 34px); letter-spacing: -0.03em; color: var(--main-dark); }
    .subtitle { margin: 4px 0 0; color: var(--muted); font-size: 13px; }
    .badge {
      flex: 0 0 auto;
      border: 1px solid var(--line);
      background: var(--card);
      color: var(--main-dark);
      border-radius: 999px;
      padding: 8px 10px;
      font-size: 12px;
      box-shadow: var(--shadow);
      white-space: nowrap;
    }
    .tabs {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
      margin: 12px 0 16px;
    }
    @media (min-width: 720px) { .tabs { grid-template-columns: repeat(4, minmax(0, 1fr)); } }
    .tab-btn {
      appearance: none;
      border: 1px solid var(--line);
      background: var(--card);
      color: var(--main-dark);
      border-radius: 16px;
      min-height: 52px;
      padding: 10px 12px;
      font-weight: 700;
      font-size: 15px;
      box-shadow: 0 6px 16px rgba(35, 77, 90, 0.08);
    }
    .tab-btn.active { background: var(--main); color: #fff; border-color: var(--main); }
    .panel { display: none; }
    .panel.active { display: block; }
    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 16px;
      margin: 0 0 14px;
    }
    .card h2 { margin: 0 0 12px; font-size: 20px; color: var(--main-dark); }
    .card h3 { margin: 16px 0 8px; font-size: 16px; color: var(--main-dark); }
    label { display: block; font-weight: 700; margin: 12px 0 6px; color: var(--text); }
    input, select {
      width: 100%;
      appearance: none;
      border: 1px solid var(--line);
      background: #fbfeff;
      color: var(--text);
      border-radius: 14px;
      min-height: 48px;
      padding: 10px 12px;
      font-size: 16px;
      outline: none;
    }
    input:focus, select:focus { border-color: var(--main); box-shadow: 0 0 0 3px rgba(79, 143, 163, 0.18); }
    .suggest-box {
      position: relative;
    }
    .suggestions {
      display: none;
      position: absolute;
      z-index: 50;
      left: 0;
      right: 0;
      top: calc(100% + 4px);
      max-height: 260px;
      overflow-y: auto;
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 14px;
      box-shadow: 0 12px 26px rgba(35, 77, 90, 0.16);
      padding: 6px;
    }
    .suggestions.active {
      display: block;
    }
    .suggestion-item {
      width: 100%;
      border: 0;
      background: transparent;
      color: var(--text);
      text-align: left;
      font-size: 16px;
      font-weight: 700;
      padding: 10px 12px;
      border-radius: 10px;
      min-height: 42px;
    }
    .suggestion-item:active,
    .suggestion-item:hover {
      background: var(--soft);
      color: var(--main-dark);
    }
    .type-matchup-block {
      margin-top: 14px;
      padding-top: 12px;
      border-top: 1px solid var(--line);
    }
    .type-matchup-heading {
      font-size: 15px;
      font-weight: 900;
      color: var(--main-dark);
      margin-bottom: 8px;
    }
    .grid { display: grid; gap: 12px; }
    @media (min-width: 720px) { .grid.two { grid-template-columns: repeat(2, minmax(0, 1fr)); } .grid.three { grid-template-columns: repeat(3, minmax(0, 1fr)); } }
    .action-row { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 14px; }
    button.action {
      border: 0;
      border-radius: 14px;
      background: var(--main);
      color: white;
      font-weight: 800;
      font-size: 16px;
      padding: 12px 16px;
      min-height: 48px;
      flex: 1 1 160px;
    }
    button.secondary { background: var(--soft); color: var(--main-dark); }
    .result { margin-top: 14px; }
    .result-card {
      border: 1px solid var(--line);
      background: #fbfeff;
      border-radius: 16px;
      padding: 14px;
      margin: 10px 0;
    }
    .name-line { display: flex; align-items: baseline; gap: 8px; flex-wrap: wrap; }
    .poke-name { font-size: 20px; font-weight: 900; color: var(--main-dark); }
    .types { display: inline-flex; gap: 6px; flex-wrap: wrap; }
    .type-pill {
      display: inline-block;
      border-radius: 999px;
      padding: 3px 9px;
      background: var(--soft);
      color: var(--main-dark);
      font-size: 12px;
      font-weight: 800;
    }
    .stats { width: 100%; border-collapse: collapse; margin-top: 10px; overflow: hidden; border-radius: 12px; }
    .stats th, .stats td { border-bottom: 1px solid var(--line); padding: 8px 6px; text-align: right; font-size: 14px; }
    .stats th:first-child, .stats td:first-child { text-align: left; color: var(--muted); }
    .stats tr:last-child th, .stats tr:last-child td { border-bottom: 0; }
    .mini { font-size: 13px; color: var(--muted); }
    .error { border-color: #ffd3d3; background: #fff8f8; color: #8b3a3a; }
    .success { border-color: var(--line); background: #fbfeff; }
    .match-group { margin: 10px 0; }
    .match-title { font-weight: 900; color: var(--main-dark); margin-bottom: 5px; }
    .chip-list { display: flex; gap: 6px; flex-wrap: wrap; }
    .chip {
      display: inline-block;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: white;
      padding: 5px 10px;
      font-size: 13px;
      font-weight: 700;
    }
    .damage-output {
      font-size: clamp(26px, 8vw, 42px);
      font-weight: 900;
      color: var(--main-dark);
      letter-spacing: -0.04em;
      text-align: center;
      padding: 20px 8px;
    }
    .footer-note { margin-top: 18px; color: var(--muted); font-size: 12px; text-align: center; }
  </style>
</head>
<body>
  <div class="app">
    <header>
      <div class="title-wrap">
        <h1>ポケモンチャンピオンズ検索ツール</h1>
      </div>
      <div class="badge">275体 / 技296種</div>
    </header>

    <nav class="tabs" aria-label="機能選択">
      <button class="tab-btn active" data-tab="search">1 ポケモン名</button>
      <button class="tab-btn" data-tab="compare">2 種族値比較</button>
      <button class="tab-btn" data-tab="type">3 タイプ相性</button>
      <button class="tab-btn" data-tab="damage">4 ダメージ計算</button>
    </nav>

    <section id="search" class="panel active">
      <div class="card">
        <h2>ポケモン名</h2>
        <label for="searchName">ポケモン名を入力</label>
        <input id="searchName" list="pokemonNames" placeholder="例：ゲンガー、メガリザードンX">
        <div class="action-row"><button class="action" id="searchBtn">検索</button></div>
        <div id="searchResult" class="result"></div>
      </div>
    </section>

    <section id="compare" class="panel">
      <div class="card">
        <h2>種族値比較</h2>
        <div class="grid two">
          <div>
            <label for="compareA">1匹目</label>
            <input id="compareA" list="pokemonNames" placeholder="例：ゲンガー">
          </div>
          <div>
            <label for="compareB">2匹目</label>
            <input id="compareB" list="pokemonNames" placeholder="例：メガゲンガー">
          </div>
        </div>
        <div class="action-row"><button class="action" id="compareBtn">比較</button></div>
        <div id="compareResult" class="result"></div>
      </div>
    </section>

    <section id="type" class="panel">
      <div class="card">
        <h2>タイプ相性</h2>
        <label for="typeMode">検索方法</label>
        <select id="typeMode">
          <option value="attack">使用する技のタイプから検索</option>
          <option value="defense">防御側のタイプから検索</option>
        </select>
        <label for="typeSelect">タイプ</label>
        <select id="typeSelect"></select>
        <div class="action-row"><button class="action" id="typeBtn">表示</button></div>
        <div id="typeResult" class="result"></div>
      </div>
    </section>

    <section id="damage" class="panel">
      <div class="card">
        <h2>ダメージ計算</h2>
        <div class="grid three">
          <div>
            <label for="attackerName">攻撃側ポケモン</label>
            <input id="attackerName" list="pokemonNames" placeholder="例：メガゲンガー">
          </div>
          <div>
            <label for="defenderName">防御側ポケモン</label>
            <input id="defenderName" list="pokemonNames" placeholder="例：カビゴン">
          </div>
          <div>
            <label for="moveName">技</label>
            <input id="moveName" list="moveNames" placeholder="例：シャドーボール">
          </div>
        </div>
        <div class="action-row"><button class="action" id="damageBtn">計算</button></div>
        <div id="damageResult" class="result"></div>
      </div>
    </section>

    <datalist id="pokemonNames"></datalist>
    <datalist id="moveNames"></datalist>
  </div>

  <script>
    const DATA = JSON.parse(document.getElementById('app-data').textContent);
    const POKEMON = DATA.pokemon;
    const TYPE_CHART_DEFENSE = DATA.typeChartDefense;
    const ALL_TYPES = DATA.allTypes;
    const MOVES = DATA.moves;
    const MOVE_ALIASES = DATA.moveAliases;
    const SETTINGS = DATA.settings;

    const STAT_LABELS = [
      ['hp', 'HP'], ['attack', '攻撃'], ['defense', '防御'],
      ['sp_attack', '特攻'], ['sp_defense', '特防'], ['speed', '素早さ']
    ];

    function normalizeText(value) {
      return String(value || '')
        .trim()
        .replace(/[Ａ-Ｚａ-ｚ０-９]/g, ch => String.fromCharCode(ch.charCodeAt(0) - 0xFEE0))
        .toLowerCase();
    }

    function escapeHtml(value) {
      return String(value ?? '').replace(/[&<>"']/g, ch => ({
        '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
      }[ch]));
    }

    function typeText(pokemon) {
      return pokemon.type2 ? `${pokemon.type1} / ${pokemon.type2}` : pokemon.type1;
    }

    function typePills(pokemon) {
      return `<span class="types"><span class="type-pill">${escapeHtml(pokemon.type1)}</span>${pokemon.type2 ? `<span class="type-pill">${escapeHtml(pokemon.type2)}</span>` : ''}</span>`;
    }

    function totalStats(pokemon) {
      return STAT_LABELS.reduce((sum, [key]) => sum + Number(pokemon[key] || 0), 0);
    }

    function findExactPokemon(name) {
      const key = normalizeText(name);
      return POKEMON.find(p => normalizeText(p.name) === key) || null;
    }

    function findPokemonCandidates(name, limit = 12) {
      const key = normalizeText(name);
      if (!key) return [];
      const starts = POKEMON.filter(p => normalizeText(p.name).startsWith(key));
      const contains = POKEMON.filter(p => !starts.includes(p) && normalizeText(p.name).includes(key));
      return [...starts, ...contains].slice(0, limit);
    }

    function resolveSinglePokemon(name) {
      const exact = findExactPokemon(name);
      if (exact) return { pokemon: exact };
      const candidates = findPokemonCandidates(name, 8);
      if (candidates.length === 1) return { pokemon: candidates[0] };
      return { pokemon: null, candidates };
    }

    function findMove(name) {
      const raw = String(name || '').trim();
      if (MOVES[raw]) return MOVES[raw];
      const aliasTarget = MOVE_ALIASES[raw] || MOVE_ALIASES[normalizeText(raw)];
      if (aliasTarget && MOVES[aliasTarget]) return MOVES[aliasTarget];
      const key = normalizeText(raw);
      return Object.values(MOVES).find(m => normalizeText(m.name) === key) || null;
    }

    function moveCandidates(name, limit = 8) {
      const key = normalizeText(name);
      if (!key) return [];
      const all = Object.values(MOVES);
      const starts = all.filter(m => normalizeText(m.name).startsWith(key));
      const contains = all.filter(m => !starts.includes(m) && normalizeText(m.name).includes(key));
      return [...starts, ...contains].slice(0, limit);
    }

    function renderError(message, candidates = []) {
      const suggestionHtml = candidates.length ? `<div class="mini">候補: ${candidates.map(c => escapeHtml(c.name || c)).join('、')}</div>` : '';
      return `<div class="result-card error">${escapeHtml(message)}${suggestionHtml}</div>`;
    }

    function renderPokemonCard(pokemon, includeTypeMatchup = false) {
      const abilities = pokemon.abilities_description_all || pokemon.abilities_all || '特性情報なし';
      const statRows = STAT_LABELS.map(([key, label]) => `<tr><th>${label}</th><td>${pokemon[key]}</td></tr>`).join('') +
        `<tr><th>合計</th><td><strong>${totalStats(pokemon)}</strong></td></tr>`;
      return `<div class="result-card success">
        <div class="name-line"><span class="poke-name">${escapeHtml(pokemon.name)}</span>${typePills(pokemon)}</div>
        <div class="mini">${escapeHtml(abilities)}</div>
        <table class="stats"><tbody>${statRows}</tbody></table>
        ${includeTypeMatchup ? renderPokemonTypeMatchup(pokemon) : ''}
      </div>`;
    }

    function renderSearch() {
      const value = document.getElementById('searchName').value;
      const exact = findExactPokemon(value);
      const result = document.getElementById('searchResult');
      if (exact) { result.innerHTML = renderPokemonCard(exact, true); return; }
      const candidates = findPokemonCandidates(value, 20);
      if (!value.trim()) { result.innerHTML = renderError('ポケモン名を入力してください。'); return; }
      if (!candidates.length) { result.innerHTML = renderError('該当するポケモンが見つかりませんでした。'); return; }
      result.innerHTML = candidates.map(p => renderPokemonCard(p, true)).join('');
    }

    function renderCompare() {
      const a = resolveSinglePokemon(document.getElementById('compareA').value);
      const b = resolveSinglePokemon(document.getElementById('compareB').value);
      const result = document.getElementById('compareResult');
      if (!a.pokemon) { result.innerHTML = renderError('1匹目が見つかりませんでした。', a.candidates || []); return; }
      if (!b.pokemon) { result.innerHTML = renderError('2匹目が見つかりませんでした。', b.candidates || []); return; }
      const rows = STAT_LABELS.map(([key, label]) => {
        const av = Number(a.pokemon[key] || 0), bv = Number(b.pokemon[key] || 0);
        const diff = bv - av;
        return `<tr><th>${label}</th><td>${av}</td><td>${bv}</td><td>${diff > 0 ? '+' : ''}${diff}</td></tr>`;
      }).join('') + `<tr><th>合計</th><td><strong>${totalStats(a.pokemon)}</strong></td><td><strong>${totalStats(b.pokemon)}</strong></td><td><strong>${totalStats(b.pokemon)-totalStats(a.pokemon) > 0 ? '+' : ''}${totalStats(b.pokemon)-totalStats(a.pokemon)}</strong></td></tr>`;
      result.innerHTML = `<div class="result-card success">
        <div class="grid two">
          <div><div class="poke-name">${escapeHtml(a.pokemon.name)}</div>${typePills(a.pokemon)}</div>
          <div><div class="poke-name">${escapeHtml(b.pokemon.name)}</div>${typePills(b.pokemon)}</div>
        </div>
        <table class="stats"><thead><tr><th>項目</th><th>${escapeHtml(a.pokemon.name)}</th><th>${escapeHtml(b.pokemon.name)}</th><th>差</th></tr></thead><tbody>${rows}</tbody></table>
      </div>`;
    }

    function getTypeMultiplier(attackType, defenseType) {
      return (TYPE_CHART_DEFENSE[defenseType] && TYPE_CHART_DEFENSE[defenseType][attackType] !== undefined)
        ? TYPE_CHART_DEFENSE[defenseType][attackType]
        : 1.0;
    }

    function getComboMultiplier(attackType, type1, type2) {
      let value = getTypeMultiplier(attackType, type1);
      if (type2) value *= getTypeMultiplier(attackType, type2);
      return value;
    }

    function classifyValues(mode, selectedType) {
      const groups = { '2倍': [], '等倍': [], '1/2倍': [], '無効': [] };
      for (const t of ALL_TYPES) {
        const value = mode === 'attack' ? getTypeMultiplier(selectedType, t) : getTypeMultiplier(t, selectedType);
        if (value === 2) groups['2倍'].push(t);
        else if (value === 0.5) groups['1/2倍'].push(t);
        else if (value === 0) groups['無効'].push(t);
        else groups['等倍'].push(t);
      }
      return groups;
    }

    function classifyPokemonDefense(pokemon) {
      const groups = { '4倍': [], '2倍': [], '等倍': [], '1/2倍': [], '1/4倍': [], '無効': [] };
      for (const attackType of ALL_TYPES) {
        const value = getComboMultiplier(attackType, pokemon.type1, pokemon.type2);
        if (value === 4) groups['4倍'].push(attackType);
        else if (value === 2) groups['2倍'].push(attackType);
        else if (value === 1) groups['等倍'].push(attackType);
        else if (value === 0.5) groups['1/2倍'].push(attackType);
        else if (value === 0.25) groups['1/4倍'].push(attackType);
        else if (value === 0) groups['無効'].push(attackType);
      }
      return groups;
    }

    function renderPokemonTypeMatchup(pokemon) {
      const groups = classifyPokemonDefense(pokemon);
      const htmlGroups = ['4倍','2倍','等倍','1/2倍','1/4倍','無効'].map(label => `
        <div class="match-group"><div class="match-title">${label}</div>
          <div class="chip-list">${groups[label].length ? groups[label].map(v => `<span class="chip">${escapeHtml(v)}</span>`).join('') : '<span class="chip">なし</span>'}</div>
        </div>`).join('');
      return `<div class="type-matchup-block">
        <div class="type-matchup-heading">このポケモンが受けるタイプ相性</div>
        ${htmlGroups}
      </div>`;
    }

    function renderTypeMatchup() {
      const mode = document.getElementById('typeMode').value;
      const type = document.getElementById('typeSelect').value;
      const result = document.getElementById('typeResult');
      if (!ALL_TYPES.includes(type)) { result.innerHTML = renderError('タイプを選択してください。'); return; }
      const groups = classifyValues(mode, type);
      const title = mode === 'attack' ? `${type}技で攻撃した場合` : `${type}タイプで受ける場合`;
      const htmlGroups = ['2倍','等倍','1/2倍','無効'].map(label => `
        <div class="match-group"><div class="match-title">${label}</div>
          <div class="chip-list">${groups[label].length ? groups[label].map(v => `<span class="chip">${escapeHtml(v)}</span>`).join('') : '<span class="chip">なし</span>'}</div>
        </div>`).join('');
      result.innerHTML = `<div class="result-card success"><div class="poke-name">${escapeHtml(title)}</div>${htmlGroups}</div>`;
    }

    function calculateActualStat(base, isHp=false) {
      const level = SETTINGS.level, iv = SETTINGS.iv, sp = SETTINGS.sp;
      if (isHp) return Math.floor(((2 * base + iv + (sp * 2)) * level) / 100) + level + 10;
      return Math.floor(((2 * base + iv + (sp * 2)) * level) / 100) + 5;
    }

    function getStab(attacker, moveType) {
      if (attacker.type1 !== moveType && attacker.type2 !== moveType) return 1.0;
      const abilities = `${attacker.abilities_all || ''} ${attacker.ability1 || ''} ${attacker.ability2 || ''} ${attacker.hidden_ability || ''}`;
      return abilities.includes('てきおうりょく') ? 2.0 : 1.5;
    }

    function getMovePower(move) {
      if (move.special_rule === 'acrobatics') return move.power * 2;
      return move.power;
    }

    function calculateDamagePercent(attacker, defender, move) {
      const typeMultiplier = getComboMultiplier(move.type, defender.type1, defender.type2);
      const defenderHp = calculateActualStat(Number(defender.hp), true);
      if (typeMultiplier === 0) {
        return { min: 0, max: 0, ohkoChance: 0, ohkoCount: 0, rollCount: 16 };
      }
      let attackBase, defenseBase;
      if (move.special_rule === 'defense_attack') {
        attackBase = Number(attacker.defense); defenseBase = Number(defender.defense);
      } else if (move.special_rule === 'target_attack') {
        attackBase = Number(defender.attack); defenseBase = Number(defender.defense);
      } else if (move.category === 'physical') {
        attackBase = Number(attacker.attack); defenseBase = Number(defender.defense);
      } else if (move.category === 'special') {
        attackBase = Number(attacker.sp_attack);
        defenseBase = move.special_rule === 'physical_defense' ? Number(defender.defense) : Number(defender.sp_defense);
      } else {
        return null;
      }
      const level = SETTINGS.level;
      const power = getMovePower(move);
      const attackStat = calculateActualStat(attackBase, false);
      const defenseStat = calculateActualStat(defenseBase, false);
      const modifier = getStab(attacker, move.type) * typeMultiplier;
      const baseDamage = Math.floor(Math.floor(Math.floor(((Math.floor((2 * level) / 5) + 2) * power * attackStat) / defenseStat) / 50) + 2);
      const rolls = [];
      for (let random = 85; random <= 100; random++) {
        let dmg = Math.floor(baseDamage * modifier * random / 100);
        if (dmg < 1) dmg = 1;
        rolls.push(dmg);
      }
      const minDamage = Math.min(...rolls), maxDamage = Math.max(...rolls);
      const ohkoCount = rolls.filter(dmg => dmg >= defenderHp).length;
      const ohkoChance = ohkoCount / rolls.length * 100;
      return {
        min: minDamage / defenderHp * 100,
        max: maxDamage / defenderHp * 100,
        ohkoChance,
        ohkoCount,
        rollCount: rolls.length
      };
    }

    function renderDamage() {
      const attackerRes = resolveSinglePokemon(document.getElementById('attackerName').value);
      const defenderRes = resolveSinglePokemon(document.getElementById('defenderName').value);
      const moveInput = document.getElementById('moveName').value;
      const move = findMove(moveInput);
      const result = document.getElementById('damageResult');
      if (!attackerRes.pokemon) { result.innerHTML = renderError('攻撃側ポケモンが見つかりませんでした。', attackerRes.candidates || []); return; }
      if (!defenderRes.pokemon) { result.innerHTML = renderError('防御側ポケモンが見つかりませんでした。', defenderRes.candidates || []); return; }
      if (!move) { result.innerHTML = renderError('技が見つかりませんでした。', moveCandidates(moveInput)); return; }
      const pct = calculateDamagePercent(attackerRes.pokemon, defenderRes.pokemon, move);
      if (!pct) { result.innerHTML = renderError('この技はダメージ計算対象外です。'); return; }
      result.innerHTML = `
        <div class="result-card success">
          <div style="font-size:13px;font-weight:700;color:var(--muted);text-align:center;">HPに対する割合</div>
          <div class="damage-output">${pct.min.toFixed(1)}%〜${pct.max.toFixed(1)}%</div>
          <div style="font-size:15px;font-weight:800;text-align:center;margin-top:2px;">
            100%以上になる確率: ${pct.ohkoChance.toFixed(1)}%（${pct.ohkoCount}/${pct.rollCount}）
          </div>
          <div style="font-size:12px;line-height:1.6;color:var(--muted);text-align:center;margin-top:12px;">
            計算条件: Lv.${SETTINGS.level} / 個体値31相当 / 能力ポイント32相当 / 性格補正なし / 道具補正なし
          </div>
        </div>`;
    }

    function closeAllPokemonSuggestions(exceptBox = null) {
      document.querySelectorAll('.suggestions').forEach(box => {
        if (box !== exceptBox) {
          box.classList.remove('active');
          box.innerHTML = '';
        }
      });
    }

    function attachPokemonSuggestions(inputId, options = {}) {
      const input = document.getElementById(inputId);
      if (!input) return;
      input.removeAttribute('list');
      input.setAttribute('autocomplete', 'off');

      const wrapper = document.createElement('div');
      wrapper.className = 'suggest-box';
      input.parentNode.insertBefore(wrapper, input);
      wrapper.appendChild(input);

      const box = document.createElement('div');
      box.className = 'suggestions';
      wrapper.appendChild(box);

      const render = () => {
        const value = input.value;
        const candidates = findPokemonCandidates(value, 8);
        if (!value.trim() || !candidates.length) {
          box.classList.remove('active');
          box.innerHTML = '';
          return;
        }

        box.innerHTML = candidates.map(p =>
          `<button type="button" class="suggestion-item" data-name="${escapeHtml(p.name)}">${escapeHtml(p.name)}</button>`
        ).join('');
        box.classList.add('active');
      };

      input.addEventListener('input', render);
      input.addEventListener('focus', render);
      input.addEventListener('keydown', e => {
        if (e.key === 'Escape') {
          box.classList.remove('active');
          box.innerHTML = '';
        }
      });

      box.addEventListener('pointerdown', e => {
        const item = e.target.closest('.suggestion-item');
        if (!item) return;
        e.preventDefault();
        input.value = item.dataset.name;
        box.classList.remove('active');
        box.innerHTML = '';
        if (typeof options.onSelect === 'function') options.onSelect(input.value);
      });

      input.addEventListener('blur', () => {
        setTimeout(() => {
          box.classList.remove('active');
          box.innerHTML = '';
        }, 120);
      });
    }

    function setup() {
      const pokemonList = document.getElementById('pokemonNames');
      pokemonList.innerHTML = POKEMON.map(p => `<option value="${escapeHtml(p.name)}"></option>`).join('');
      const moveList = document.getElementById('moveNames');
      moveList.innerHTML = Object.values(MOVES).map(m => `<option value="${escapeHtml(m.name)}"></option>`).join('');
      const typeSelect = document.getElementById('typeSelect');
      typeSelect.innerHTML = ALL_TYPES.map(t => `<option value="${escapeHtml(t)}">${escapeHtml(t)}</option>`).join('');

      document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
          document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
          btn.classList.add('active');
          document.getElementById(btn.dataset.tab).classList.add('active');
        });
      });
      document.getElementById('searchBtn').addEventListener('click', renderSearch);
      document.getElementById('compareBtn').addEventListener('click', renderCompare);
      document.getElementById('typeBtn').addEventListener('click', renderTypeMatchup);
      document.getElementById('damageBtn').addEventListener('click', renderDamage);

      attachPokemonSuggestions('searchName', { onSelect: renderSearch });
      attachPokemonSuggestions('compareA');
      attachPokemonSuggestions('compareB');
      attachPokemonSuggestions('attackerName');
      attachPokemonSuggestions('defenderName');

      ['searchName','compareA','compareB','attackerName','defenderName','moveName'].forEach(id => {
        document.getElementById(id).addEventListener('keydown', e => { if (e.key === 'Enter') {
          if (id === 'searchName') renderSearch();
          else if (id === 'compareA' || id === 'compareB') renderCompare();
          else renderDamage();
        } });
      });
      document.addEventListener('pointerdown', e => {
        if (!e.target.closest('.suggest-box')) closeAllPokemonSuggestions();
      });
      renderTypeMatchup();
    }
    setup();
  </script>
</body>
</html>
